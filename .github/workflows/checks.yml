name: Checks

on:
  push:
    branches: ["master"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  repository:
    name: Repository integrity
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Check JavaScript syntax
        run: node --check skills/evenhub-pixel-icons/scripts/grid2svg.mjs

      - name: Check repository contents
        run: node scripts/check-repository.mjs
